<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>YouTube → Whisper</title>
<style>
  body { font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
         max-width: 860px; margin: 40px auto; padding: 0 20px; color: #222; }
  h1 { margin-bottom: 4px; }
  .sub { color: #666; font-size: 14px; margin-top: 0; }
  form { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 20px 0; }
  input[type=text] { flex: 1; min-width: 320px; font-size: 16px; padding: 10px 12px;
                     border: 1px solid #ccc; border-radius: 8px; }
  select, button { font-size: 16px; padding: 10px 14px; border-radius: 8px;
                   border: 1px solid #ccc; background: #fff; cursor: pointer; }
  button { background: #111; color: #fff; border-color: #111; }
  button:disabled { opacity: 0.5; cursor: wait; }
  .meta { color: #555; font-size: 14px; margin: 8px 0; }
  .err { color: #c00; }
  pre { white-space: pre-wrap; background: #f6f6f6; padding: 16px;
        border-radius: 10px; max-height: 60vh; overflow: auto; line-height: 1.5; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px;
           background: #eef; color: #225; font-size: 12px; }
</style>
</head>
<body>
<h1>YouTube → Whisper</h1>
<p class="sub">
  URL 또는 제목을 넣으면 mp3로 받아서 전사함.
  <span class="badge">model: {{ model_size }}</span>
  <span class="badge">device: {{ device }}</span>
</p>

<form id="f" onsubmit="return submitForm(event)">
  <input type="text" id="q" placeholder="https://youtu.be/... 또는 검색할 제목" autofocus>
  <select id="lang" title="언어">
    <option value="">자동감지</option>
    <option value="ko">한국어</option>
    <option value="en">English</option>
    <option value="ja">日本語</option>
  </select>
  <button id="btn" type="submit">전사 시작</button>
</form>

<div id="status" class="meta"></div>
<pre id="out"></pre>

<script>
async function submitForm(e) {
  e.preventDefault();
  const q = document.getElementById("q").value.trim();
  const lang = document.getElementById("lang").value;
  const btn = document.getElementById("btn");
  const status = document.getElementById("status");
  const out = document.getElementById("out");
  if (!q) return false;

  btn.disabled = true;
  status.className = "meta";
  status.textContent = "처리 중... (다운로드 + 전사. 첫 실행은 모델 로드로 더 걸림)";
  out.textContent = "";

  try {
    const res = await fetch("/transcribe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: q, language: lang })
    });
    const data = await res.json();
    if (!res.ok) {
      status.className = "err";
      status.textContent = "에러: " + (data.error || res.status);
      return false;
    }
    status.textContent = "완료: " + data.media;
    out.textContent = data.transcript;
  } catch (err) {
    status.className = "err";
    status.textContent = "에러: " + err;
  } finally {
    btn.disabled = false;
  }
  return false;
}
</script>
</body>
</html>
